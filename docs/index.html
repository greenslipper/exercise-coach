<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fc4c02">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Coach">
  <title>Exercise Coach</title>
  <link rel="icon" type="image/jpeg" href="icon.jpg">
  <link rel="apple-touch-icon" href="icon.jpg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=20260401">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <h1>Exercise Coach</h1>
        <span class="goal-badge" id="goal-badge">5K Training</span>
      </div>
      <div class="header-meta" id="generated-date">Loading...</div>
    </header>

    <!-- Today's workout -->
    <section class="today-section" id="today-section">
      <div class="today-card">
        <div class="today-label">Today</div>
        <div class="today-workout-name" style="color:var(--light)">Loading plan...</div>
        <div class="today-workout-desc"></div>
      </div>
    </section>

    <!-- Main content: week / plan tabs -->
    <main id="main-content">
      <nav class="tab-nav" id="tab-nav">
        <button class="tab-btn active" id="tab-week" onclick="showTab('week')">This Week</button>
        <button class="tab-btn" id="tab-plan" onclick="showTab('plan')">Full Plan</button>
        <button class="tab-btn" id="tab-gym" onclick="showTab('gym')">Gym Log</button>
      </nav>
      <section id="week-section"></section>
      <section id="plan-section" style="display:none"></section>
      <section id="gym-section" style="display:none"></section>
    </main>

  </div>

  <!-- Workout detail modal -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      <div class="modal-date" id="modal-date"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
    </div>
  </div>

  <!-- Log exercise modal -->
  <div class="modal-overlay" id="log-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeLogModal()" aria-label="Close">✕</button>
      <div class="modal-date" id="log-modal-date"></div>
      <div class="modal-title" id="log-modal-title"></div>
      <div class="log-field">
        <label class="log-label">Weight</label>
        <div class="log-weight-row">
          <input type="number" id="log-weight-field" class="log-weight-input"
                 placeholder="—" step="2.5" min="0" inputmode="decimal">
          <span class="log-weight-unit">kg</span>
        </div>
      </div>
      <div class="log-field">
        <label class="log-label">Notes</label>
        <div class="quick-notes">
          <button class="quick-note-btn" data-note="Felt easy" onclick="setQuickNote(this, 'Felt easy')">Felt easy</button>
          <button class="quick-note-btn" data-note="Felt hard" onclick="setQuickNote(this, 'Felt hard')">Felt hard</button>
          <button class="quick-note-btn" data-note="Didn't complete" onclick="setQuickNote(this, 'Didn\'t complete')">Didn't complete</button>
          <button class="quick-note-btn" data-note="Didn't do" onclick="setQuickNote(this, 'Didn\'t do')">Didn't do</button>
        </div>
        <textarea id="log-notes-field" class="log-notes-input"
                  placeholder="or type your own note…" rows="2"></textarea>
      </div>
      <div class="log-save-wrap">
        <button class="log-save-btn" id="log-save-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <button class="modal-close" onclick="closeSettings()" aria-label="Close">✕</button>
      <div class="modal-title">Cloud Sync</div>
      <p class="modal-desc" style="margin-bottom:1rem;font-size:0.85rem">
        Connect to your Cloudflare Worker so Claude can read your gym logs automatically.
      </p>
      <div class="log-field">
        <label class="log-label" for="settings-url">Worker URL</label>
        <input type="url" id="settings-url" class="settings-input"
               placeholder="https://exercise-coach.greenfgm.workers.dev"
               autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="log-field">
        <label class="log-label" for="settings-secret">Secret</label>
        <input type="password" id="settings-secret" class="settings-input"
               placeholder="your auth secret" autocomplete="off">
      </div>
      <div class="log-save-wrap">
        <button class="log-save-btn" onclick="saveSettings()">Save &amp; Sync</button>
      </div>
      <div class="log-save-wrap" style="margin-top:0.5rem">
        <button class="log-save-btn" id="push-to-worker-btn" onclick="pushLocalDataToWorker()"
                style="background:#555">Push local data to cloud</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=20260409"></script>
</body>
</html>
